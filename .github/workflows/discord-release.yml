name: Discord Release Announcement

on:
  release:
    types: [published]

jobs:
  post-to-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send release to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
          REPO: ${{ github.repository }}
        run: |
          INSTALLER_URL="https://github.com/${REPO}/releases/latest/download/VokunWLInstaller.exe"

          BODY_TRIMMED="$(echo "$RELEASE_BODY" | head -c 1200)"

          PAYLOAD="$(jq -n \
            --arg tag "$RELEASE_TAG" \
            --arg name "$RELEASE_NAME" \
            --arg url "$RELEASE_URL" \
            --arg installer "$INSTALLER_URL" \
            --arg body "$BODY_TRIMMED" \
            '{
              username: "SkyV Release Bot",
              embeds: [
                {
                  title: ("New Launcher Release: " + ($name // $tag)),
                  url: $url,
                  color: 5814783,
                  description:
                    ("**Tag:** `" + $tag + "`\n" +
                     "**Installer:** [Download Latest](" + $installer + ")\n" +
                     "**Release Notes:** [View on GitHub](" + $url + ")\n\n" +
                     (if ($body|length) > 0 then $body else "_No release notes provided._" end)),
                  footer: { text: "SkyV Launcher Releases" }
                }
              ]
            }')"

          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
